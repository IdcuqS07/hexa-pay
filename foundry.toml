[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib", "node_modules"]
solc_version = "0.8.25"
optimizer = true
optimizer_runs = 200
fs_permissions = [{ access = "read-write", path = "./" }]

[rpc_endpoints]
local = "http://127.0.0.1:8545"
fhenix_testnet = "${FHENIX_RPC_URL}"

[profile.ci]
verbosity = 4
